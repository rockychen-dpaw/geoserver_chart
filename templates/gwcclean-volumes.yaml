{{- if and (hasKey $.Values "gwcClean") $.Values.gwcClean.volume }}
{{- $config := $.Values.gwcClean.volume }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $.Release.Name }}-geoserver-gwcclean-report-data
spec:
  accessModes:
    - {{ $config.accessMode | default "ReadWriteOnce" }}
  resources:
    requests:
      storage: {{ $config.storage}}
  storageClassName: {{ $config.storageClassName | default "managed-csi-retain" }}
  volumeMode: {{ $config.volumeMode | default "Filesystem" }}
{{- end }}
