{{- if and (hasKey $.Values "gwcClean") (hasKey $.Values.gwcClean "imagepull") }}
{{- $data := dict "auths" (dict ($.Values.gwcClean.imagepull.domain | default "ghcr.io")  (dict "username" ($.Values.gwcClean.imagepull.username ) "password" ($.Values.gwcClean.imagepull.password ) )) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $.Release.Name }}-geoserver-gwcclean-secret-imagepull
  namespace: {{ $.Release.Namespace }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ toJson $data | b64enc }}
{{- end }}
